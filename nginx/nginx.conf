# =============================================================================
# InHealth Chronic Care Platform - Nginx Main Configuration
# =============================================================================
# Production-grade Nginx configuration for the InHealth platform.
# This file handles global settings; per-server rules live in conf.d/*.conf
# =============================================================================

# Run as many worker processes as CPU cores
worker_processes auto;

# Maximum number of open file descriptors per worker
worker_rlimit_nofile 65535;

# Error log location and level
error_log /var/log/nginx/error.log warn;

# PID file
pid /var/run/nginx.pid;

# =============================================================================
# EVENTS
# =============================================================================
events {
    # Maximum simultaneous connections per worker
    worker_connections 4096;

    # Accept multiple connections at once
    multi_accept on;

    # Use epoll for Linux (most efficient on Linux kernels > 2.6)
    use epoll;
}

# =============================================================================
# HTTP BLOCK
# =============================================================================
http {
    # -------------------------------------------------------------------------
    # MIME TYPES
    # -------------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # LOGGING FORMAT
    # -------------------------------------------------------------------------
    # Extended log format with request timing and upstream details
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    # JSON log format for log aggregation pipelines
    log_format json_combined escape=json
        '{'
            '"time_local":"$time_local",'
            '"remote_addr":"$remote_addr",'
            '"remote_user":"$remote_user",'
            '"request":"$request",'
            '"status": "$status",'
            '"body_bytes_sent":"$body_bytes_sent",'
            '"request_time":"$request_time",'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"http_x_forwarded_for":"$http_x_forwarded_for",'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_status":"$upstream_status",'
            '"upstream_response_time":"$upstream_response_time"'
        '}';

    access_log /var/log/nginx/access.log main;

    # -------------------------------------------------------------------------
    # PERFORMANCE OPTIMIZATIONS
    # -------------------------------------------------------------------------
    # Efficient file sending (bypasses user-space copy)
    sendfile on;

    # Send TCP headers and data together (reduces packets)
    tcp_nopush on;

    # Disable Nagle algorithm for real-time responsiveness
    tcp_nodelay on;

    # Keep-alive connection timeout
    keepalive_timeout 75s;
    keepalive_requests 1000;

    # Timeouts
    client_header_timeout 15s;
    client_body_timeout   30s;
    send_timeout          30s;
    reset_timedout_connection on;

    # -------------------------------------------------------------------------
    # BUFFER SIZES
    # -------------------------------------------------------------------------
    client_max_body_size        100m;
    client_body_buffer_size     256k;
    client_header_buffer_size   4k;
    large_client_header_buffers 8 16k;

    proxy_buffer_size           16k;
    proxy_buffers               8 32k;
    proxy_busy_buffers_size     64k;
    proxy_temp_file_write_size  64k;

    # -------------------------------------------------------------------------
    # GZIP COMPRESSION
    # -------------------------------------------------------------------------
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        text/x-component
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/vnd.ms-fontobject
        application/vnd.geo+json
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        application/fhir+json
        application/fhir+xml;

    # -------------------------------------------------------------------------
    # SECURITY HEADERS (applied globally; refined per-server in conf.d)
    # -------------------------------------------------------------------------
    server_tokens off;

    # -------------------------------------------------------------------------
    # RATE LIMITING ZONES
    # -------------------------------------------------------------------------
    # General API rate limit: 100 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:20m rate=100r/s;

    # Auth endpoint rate limit: 5 requests/second per IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # Agents API rate limit: 20 requests/second per IP
    limit_req_zone $binary_remote_addr zone=agents_limit:10m rate=20r/s;

    # MCP/A2A rate limit: 50 requests/second per IP
    limit_req_zone $binary_remote_addr zone=mcp_limit:10m rate=50r/s;

    # Upload rate limit: 2 requests/second per IP
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;

    # -------------------------------------------------------------------------
    # CONNECTION LIMITING ZONES
    # -------------------------------------------------------------------------
    limit_conn_zone $binary_remote_addr zone=conn_limit:20m;

    # -------------------------------------------------------------------------
    # UPSTREAM DEFINITIONS
    # -------------------------------------------------------------------------

    # Django WSGI — HTTP requests only (Gunicorn, port 8000)
    upstream django {
        least_conn;
        server django:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Django ASGI — WebSocket requests (Daphne, port 8001)
    upstream django_asgi {
        server django:8001 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # Agents API (FastAPI + LangGraph)
    upstream agents_api {
        least_conn;
        server agents-api:8001 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # MCP Server (Node.js Model Context Protocol)
    upstream mcp_server {
        least_conn;
        server mcp-server:3003 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # A2A Gateway (Node.js Agent-to-Agent)
    upstream a2a_gateway {
        least_conn;
        server a2a-gateway:3002 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # Frontend (React/Vite — static serve in production)
    upstream frontend {
        server frontend:3000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # -------------------------------------------------------------------------
    # SSL SESSION CACHE (for TLS termination when SSL is enabled)
    # -------------------------------------------------------------------------
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # -------------------------------------------------------------------------
    # MAP: WebSocket upgrade handling
    # -------------------------------------------------------------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Map to get real client IP when behind a trusted proxy
    map $http_x_forwarded_for $real_ip {
        default          $http_x_forwarded_for;
        ""               $remote_addr;
    }

    # -------------------------------------------------------------------------
    # SERVER BLOCKS — loaded from conf.d/
    # -------------------------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
}
