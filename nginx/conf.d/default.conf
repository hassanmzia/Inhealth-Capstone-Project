# =============================================================================
# InHealth Chronic Care Platform - Nginx Server Block
# =============================================================================
# Main server block routing traffic to all application services.
# Upstream definitions live in nginx.conf (upstream blocks).
# =============================================================================

# ---------------------------------------------------------------------------
# HTTP SERVER — listens on port 80 inside the container
# (mapped to host port 8788 via docker-compose)
# ---------------------------------------------------------------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    # -------------------------------------------------------------------------
    # SECURITY HEADERS
    # -------------------------------------------------------------------------
    add_header X-Frame-Options                  "SAMEORIGIN"                always;
    add_header X-Content-Type-Options           "nosniff"                   always;
    add_header X-XSS-Protection                 "1; mode=block"             always;
    add_header Referrer-Policy                  "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy               "camera=(), microphone=(), geolocation=(self), payment=()" always;
    add_header Strict-Transport-Security        "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none';" always;

    # Prevent server version disclosure
    server_tokens off;

    # -------------------------------------------------------------------------
    # CONNECTION LIMITS
    # -------------------------------------------------------------------------
    limit_conn conn_limit 100;

    # -------------------------------------------------------------------------
    # PROXY COMMON HEADERS
    # These are set once and apply to all proxy_pass locations below.
    # -------------------------------------------------------------------------
    proxy_http_version  1.1;
    proxy_set_header    Host                $host;
    proxy_set_header    X-Real-IP           $remote_addr;
    proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto   $scheme;
    proxy_set_header    X-Forwarded-Host    $host;
    proxy_set_header    X-Forwarded-Port    $server_port;
    proxy_set_header    X-Request-ID        $request_id;

    # -------------------------------------------------------------------------
    # CORS CONFIGURATION
    # Applied at the server level; individual locations may override.
    # -------------------------------------------------------------------------
    set $cors_origin "";
    if ($http_origin ~* "^https?://(localhost|127\.0\.0\.1|172\.168\.1\.95)(:[0-9]+)?$") {
        set $cors_origin $http_origin;
    }

    # -------------------------------------------------------------------------
    # LOCATION: Platform health check (used by load balancers, Docker healthcheck)
    # -------------------------------------------------------------------------
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }

    location = /nginx-status {
        stub_status;
        access_log off;
        # Restrict to internal networks only
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;
    }

    # -------------------------------------------------------------------------
    # LOCATION: Django Admin
    # Strict rate limiting and IP restriction for admin interface
    # -------------------------------------------------------------------------
    location /admin/ {
        limit_req zone=auth_limit burst=10 nodelay;

        proxy_pass         http://django;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Additional security headers for admin
        add_header X-Frame-Options "DENY" always;
        add_header Cache-Control   "no-store, no-cache, must-revalidate" always;
    }

    # -------------------------------------------------------------------------
    # LOCATION: Django API — /api/
    # REST API endpoints served by Django (DRF)
    # -------------------------------------------------------------------------
    location /api/ {
        limit_req zone=api_limit burst=200 nodelay;

        # CORS preflight handling
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_origin;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Requested-With, X-Request-ID, Accept, Origin";
            add_header Access-Control-Allow-Credentials "true";
            add_header Access-Control-Max-Age           "86400";
            add_header Content-Length                   "0";
            add_header Content-Type                     "text/plain";
            return 204;
        }

        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Credentials "true"        always;

        proxy_pass         http://django;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;

        # Disable caching for API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma        "no-cache"  always;
        expires -1;
    }

    # -------------------------------------------------------------------------
    # LOCATION: Authentication endpoints — stricter rate limiting
    # -------------------------------------------------------------------------
    location ~ ^/api/(auth|token|login|logout|password|register)/ {
        limit_req zone=auth_limit burst=20 nodelay;

        proxy_pass         http://django;
        proxy_read_timeout 30s;

        add_header Cache-Control "no-store" always;
    }

    # -------------------------------------------------------------------------
    # LOCATION: File uploads — /api/upload/
    # Separate location for large file handling
    # -------------------------------------------------------------------------
    location /api/upload/ {
        limit_req zone=upload_limit burst=5 nodelay;

        client_max_body_size 500m;
        proxy_request_buffering off;
        proxy_pass          http://django;
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
    }

    # -------------------------------------------------------------------------
    # LOCATION: WebSockets — /ws/
    # Django Channels (ASGI) WebSocket connections
    # -------------------------------------------------------------------------
    location /ws/ {
        proxy_pass          http://django;

        # WebSocket upgrade headers
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        $connection_upgrade;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        # WebSocket timeouts — keep connection open longer
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;

        # Disable buffering for real-time messages
        proxy_buffering off;
        proxy_cache     off;

        # CORS for WebSocket handshake
        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Credentials "true"        always;
    }

    # -------------------------------------------------------------------------
    # LOCATION: Agents API — /agents/
    # FastAPI + LangGraph multi-agent service
    # -------------------------------------------------------------------------
    location /agents/ {
        limit_req zone=agents_limit burst=50 nodelay;

        # CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_origin;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Request-ID, Accept";
            add_header Access-Control-Allow-Credentials "true";
            add_header Access-Control-Max-Age           "86400";
            add_header Content-Length                   "0";
            return 204;
        }

        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Credentials "true"        always;

        proxy_pass         http://agents_api;
        proxy_read_timeout 180s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;

        # Server-Sent Events (SSE) support for streaming agent responses
        proxy_buffering    off;
        proxy_cache        off;
        proxy_set_header   Accept-Encoding "";

        add_header X-Accel-Buffering "no" always;
    }

    # -------------------------------------------------------------------------
    # LOCATION: Agents WebSocket — /agents/ws/
    # LangGraph streaming over WebSocket
    # -------------------------------------------------------------------------
    location /agents/ws/ {
        proxy_pass          http://agents_api;

        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        $connection_upgrade;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;

        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;
        proxy_cache         off;
    }

    # -------------------------------------------------------------------------
    # LOCATION: MCP Server — /mcp/
    # Node.js Model Context Protocol server
    # -------------------------------------------------------------------------
    location /mcp/ {
        limit_req zone=mcp_limit burst=100 nodelay;

        # CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_origin;
            add_header Access-Control-Allow-Methods     "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Request-ID";
            add_header Access-Control-Allow-Credentials "true";
            add_header Access-Control-Max-Age           "86400";
            add_header Content-Length                   "0";
            return 204;
        }

        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Credentials "true"        always;

        proxy_pass         http://mcp_server;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;

        # SSE support for MCP streaming
        proxy_buffering  off;
        proxy_cache      off;
        add_header X-Accel-Buffering "no" always;
    }

    # -------------------------------------------------------------------------
    # LOCATION: A2A Gateway — /a2a/
    # Node.js Agent-to-Agent communication gateway
    # -------------------------------------------------------------------------
    location /a2a/ {
        limit_req zone=mcp_limit burst=100 nodelay;

        # CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_origin;
            add_header Access-Control-Allow-Methods     "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Request-ID";
            add_header Access-Control-Allow-Credentials "true";
            add_header Access-Control-Max-Age           "86400";
            add_header Content-Length                   "0";
            return 204;
        }

        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Credentials "true"        always;

        proxy_pass         http://a2a_gateway;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;

        proxy_buffering  off;
        proxy_cache      off;
    }

    # -------------------------------------------------------------------------
    # LOCATION: Agent Card (Google A2A Discovery)
    # Serves the .well-known/agent.json for A2A protocol discovery
    # -------------------------------------------------------------------------
    location /.well-known/agent.json {
        proxy_pass         http://a2a_gateway;
        proxy_read_timeout 10s;
        add_header Content-Type "application/json" always;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # -------------------------------------------------------------------------
    # LOCATION: Django Static Files — /static/
    # Served directly by Nginx from shared volume (fastest method)
    # -------------------------------------------------------------------------
    location /static/ {
        alias /var/www/static/;

        # Long-term caching for hashed static assets
        location ~* \.(css|js|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Gzip pre-compressed files if available
        gzip_static on;
        try_files $uri =404;
    }

    # -------------------------------------------------------------------------
    # LOCATION: Django Media Files — /media/
    # User-uploaded files (PHI — access controlled at Django level)
    # -------------------------------------------------------------------------
    location /media/ {
        alias /var/www/media/;

        # No caching for sensitive medical files
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma        "no-cache" always;

        # Security: prevent script execution in media directory
        add_header X-Content-Type-Options "nosniff" always;
        location ~* \.(php|py|sh|pl|rb|cgi)$ {
            deny all;
        }

        try_files $uri =404;
    }

    # -------------------------------------------------------------------------
    # LOCATION: Frontend — / (catch-all)
    # React SPA — routes all unmatched requests to the frontend container.
    # In production, frontend serves pre-built static files via its own Nginx.
    # -------------------------------------------------------------------------
    location / {
        proxy_pass         http://frontend;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_connect_timeout 10s;

        # WebSocket support for Vite HMR
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection $connection_upgrade;

        # SPA routing: let React Router handle 404s
        proxy_intercept_errors on;
        error_page 404 = @fallback_spa;

        # Cache static assets aggressively, but not HTML
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
            proxy_pass http://frontend;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Never cache HTML (SPA entry point)
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Fallback for SPA client-side routing
    location @fallback_spa {
        proxy_pass http://frontend;
    }

    # -------------------------------------------------------------------------
    # LOCATION: Robots.txt
    # -------------------------------------------------------------------------
    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow: /api/\nDisallow: /admin/\nDisallow: /agents/\nDisallow: /mcp/\nDisallow: /a2a/\n";
        access_log off;
    }

    # -------------------------------------------------------------------------
    # LOCATION: Favicon
    # -------------------------------------------------------------------------
    location = /favicon.ico {
        proxy_pass http://frontend;
        access_log off;
        log_not_found off;
        expires 1d;
    }

    # -------------------------------------------------------------------------
    # ERROR PAGES
    # -------------------------------------------------------------------------
    error_page 400 /error/400.html;
    error_page 401 /error/401.html;
    error_page 403 /error/403.html;
    error_page 404 /error/404.html;
    error_page 500 502 503 504 /error/50x.html;

    location ^~ /error/ {
        proxy_pass http://frontend;
        internal;
    }

    # -------------------------------------------------------------------------
    # ACCESS LOG
    # -------------------------------------------------------------------------
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;
}
