{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "healthcare.fullname" . }}-main
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "healthcare.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
  - hosts:
    - {{ .Values.global.domain }}
    - "*.{{ .Values.global.domain }}"
    secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
  - host: {{ .Values.global.domain }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "healthcare.fullname" . }}-django
            port:
              number: 8000
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: {{ include "healthcare.fullname" . }}-websocket
            port:
              number: 8080
      - path: /static
        pathType: Prefix
        backend:
          service:
            name: {{ include "healthcare.fullname" . }}-static
            port:
              number: 80
  - host: api.{{ .Values.global.domain }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "healthcare.fullname" . }}-kong
            port:
              number: 8000
  - host: monitoring.{{ .Values.global.domain }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "healthcare.fullname" . }}-grafana
            port:
              number: 3000
  - host: logs.{{ .Values.global.domain }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "healthcare.fullname" . }}-kibana
            port:
              number: 5601
{{- end }}
---
{{- if .Values.ingress.tls.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "healthcare.fullname" . }}-tls
  namespace: {{ .Values.namespace.name }}
spec:
  secretName: {{ .Values.ingress.tls.secretName }}
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - {{ .Values.global.domain }}
  - "*.{{ .Values.global.domain }}"
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@{{ .Values.global.domain }}
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: {{ .Values.ingress.className }}
{{- end }}
