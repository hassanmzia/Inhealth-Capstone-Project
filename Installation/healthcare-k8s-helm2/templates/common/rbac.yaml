{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "healthcare.serviceAccountName" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "healthcare.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "healthcare.fullname" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "healthcare.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "healthcare.fullname" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "healthcare.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "healthcare.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "healthcare.serviceAccountName" . }}
  namespace: {{ .Values.namespace.name }}
{{- end }}
