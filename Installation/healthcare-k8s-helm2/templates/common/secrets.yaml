apiVersion: v1
kind: Secret
metadata:
  name: {{ include "healthcare.fullname" . }}-django-secrets
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "healthcare.labels" . | nindent 4 }}
type: Opaque
stringData:
  secret-key: {{ .Values.application.django.secrets.secretKey | default (randAlphaNum 50) | quote }}
  database-url: {{ .Values.application.django.secrets.databaseUrl | default (printf "postgresql://%s:%s@%s-postgresql:5432/%s" .Values.data.postgresql.auth.username .Values.data.postgresql.auth.password (include "healthcare.fullname" .) .Values.data.postgresql.auth.database) | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "healthcare.fullname" . }}-postgres-secrets
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "healthcare.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ .Values.data.postgresql.auth.password | default (randAlphaNum 32) | quote }}
  password: {{ .Values.data.postgresql.auth.password | default (randAlphaNum 32) | quote }}
  username: {{ .Values.data.postgresql.auth.username | quote }}
  database: {{ .Values.data.postgresql.auth.database | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "healthcare.fullname" . }}-neo4j-secrets
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "healthcare.labels" . | nindent 4 }}
type: Opaque
stringData:
  neo4j-password: {{ .Values.data.neo4j.auth.password | default (randAlphaNum 32) | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "healthcare.fullname" . }}-rabbitmq-secrets
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "healthcare.labels" . | nindent 4 }}
type: Opaque
stringData:
  rabbitmq-password: {{ .Values.data.rabbitmq.auth.password | default (randAlphaNum 32) | quote }}
  rabbitmq-erlang-cookie: {{ randAlphaNum 32 | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "healthcare.fullname" . }}-minio-secrets
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "healthcare.labels" . | nindent 4 }}
type: Opaque
stringData:
  root-user: {{ .Values.data.minio.auth.rootUser | quote }}
  root-password: {{ .Values.data.minio.auth.rootPassword | default (randAlphaNum 32) | quote }}
---
{{- if .Values.monitoring.grafana.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "healthcare.fullname" . }}-grafana-secrets
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "healthcare.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-password: {{ .Values.monitoring.grafana.adminPassword | default (randAlphaNum 32) | quote }}
{{- end }}
