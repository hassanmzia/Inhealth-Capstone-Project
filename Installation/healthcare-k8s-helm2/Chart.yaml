apiVersion: v2
name: healthcare-system
description: Complete Healthcare System with AI Agents on Kubernetes
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - healthcare
  - ai
  - machine-learning
  - microservices
maintainers:
  - name: Healthcare System Team
    email: team@healthcare.example.com
home: https://healthcare.example.com
sources:
  - https://github.com/healthcare/k8s-deployment
icon: https://healthcare.example.com/logo.png

dependencies:
  - name: postgresql
    version: "12.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "17.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: rabbitmq
    version: "12.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: rabbitmq.enabled
  - name: prometheus
    version: "23.x.x"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: monitoring.prometheus.enabled
  - name: grafana
    version: "6.x.x"
    repository: "https://grafana.github.io/helm-charts"
    condition: monitoring.grafana.enabled
  - name: elasticsearch
    version: "19.x.x"
    repository: "https://helm.elastic.co"
    condition: logging.elasticsearch.enabled
