global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'inhealth-chronic-care'

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'django'
    static_configs:
      - targets: ['django:8000']
    metrics_path: '/metrics'

  - job_name: 'agents-api'
    static_configs:
      - targets: ['agents-api:8001']
    metrics_path: '/metrics'

  - job_name: 'mcp-server'
    static_configs:
      - targets: ['mcp-server:3003']
    metrics_path: '/metrics'

  - job_name: 'a2a-gateway'
    static_configs:
      - targets: ['a2a-gateway:3002']
    metrics_path: '/metrics'

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'neo4j'
    static_configs:
      - targets: ['neo4j:2004']
    metrics_path: '/metrics'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
