groups:
  - name: infra_alerts
    rules:

      - alert: DjangoHighErrorRate
        expr: |
          (
            sum(rate(django_http_responses_total_by_status_total{status=~"5.."}[5m]))
            /
            sum(rate(django_http_responses_total_by_status_total[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Django HTTP 5xx error rate exceeds 5%"
          description: "Django application is returning HTTP 5xx errors at {{ $value | humanizePercentage }} of all requests over the last 5 minutes. Check application logs for errors."
          runbook: "https://wiki.inhealth.io/runbooks/django-high-error-rate"

      - alert: DatabaseConnectionPoolExhausted
        expr: |
          pg_stat_activity_count{state="idle"} < 5
        for: 2m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "PostgreSQL connection pool nearly exhausted"
          description: "PostgreSQL has fewer than 5 idle connections available (current: {{ $value }}). New connections may fail. Investigate active long-running queries and connection leaks."
          runbook: "https://wiki.inhealth.io/runbooks/db-connection-pool-exhausted"

      - alert: RedisMemoryHigh
        expr: |
          (redis_memory_used_bytes / redis_memory_max_bytes) > 0.80
        for: 5m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "Redis memory usage exceeds 80%"
          description: "Redis instance {{ $labels.instance }} is using {{ $value | humanizePercentage }} of available memory. Consider eviction policy review or scaling Redis."
          runbook: "https://wiki.inhealth.io/runbooks/redis-memory-high"

      - alert: DiskSpaceLow
        expr: |
          (
            (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs"} / node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs"})
          ) < 0.10
        for: 5m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "Disk space below 10% on {{ $labels.instance }}"
          description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} has only {{ $value | humanizePercentage }} disk space remaining. Immediate cleanup or capacity expansion required."
          runbook: "https://wiki.inhealth.io/runbooks/disk-space-low"

      - alert: HighCPUUsage
        expr: |
          (
            1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) by (instance)
          ) > 0.85
        for: 10m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "CPU usage exceeds 85% on {{ $labels.instance }}"
          description: "Instance {{ $labels.instance }} has had CPU usage above 85% for 10 minutes (current: {{ $value | humanizePercentage }}). Investigate resource-intensive processes."
          runbook: "https://wiki.inhealth.io/runbooks/high-cpu-usage"

      - alert: ServiceDown
        expr: |
          up == 0
        for: 1m
        labels:
          severity: critical
          team: infrastructure
        annotations:
          summary: "Service {{ $labels.job }} on {{ $labels.instance }} is down"
          description: "Health check for service {{ $labels.job }} at {{ $labels.instance }} has been failing for more than 1 minute. Immediate investigation and restart may be required."
          runbook: "https://wiki.inhealth.io/runbooks/service-down"
