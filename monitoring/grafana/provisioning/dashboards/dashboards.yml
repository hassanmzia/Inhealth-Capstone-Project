apiVersion: 1

providers:
  - name: 'InHealth Dashboards'
    orgId: 1
    folder: 'InHealth Chronic Care'
    folderUid: 'inhealth-dashboards'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: false
